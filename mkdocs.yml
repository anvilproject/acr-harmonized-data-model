---
site_name: "acr-harmonized-data-model"

# Hoping this forces the path I am writing files to, since that
# appears to be where just test-site looks
docs_dir: docs

theme:
  name: material
  # palette:
  #  scheme: slate
  #  primary: cyan
  features:
    - content.tabs.link

# for adding extra css/js see https://www.mkdocs.org/user-guide/customizing-your-theme/

plugins:
  - search
  - mknotebooks:
      execute: false
  - mermaid2:
      version: 11.4.1
  # TODO rebuild docs on schema change (https://github.com/dalito/linkml-project-copier/issues/39)
  # - gen-files:
  #     scripts:
  #       - gen_pages.py  # or any other name or path

watch:
  - src/acr_harmonized_data_model/schema

nav:
  - Home: index.md
  - Schema: elements/index.md
  - Mappings: harmony.md
  # - About: about.md

exclude_docs: |
  /templates-linkml/

site_url: https://anvilproject.github.io/acr-harmonized-data-model
repo_url: https://github.com/anvilproject/acr-harmonized-data-model

# Uncomment this block to enable use of Google Analytics.
# Replace the property value with your own ID.
# extra:
#   analytics:
#     provider: google
#     property: G-XXXXXXXXXX
extra_css:
  - stylesheets/extra.css
